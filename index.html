<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tavel Booking</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div class="box1">
        <h1 id="title">Travel Booking Form</h1>

        <table>
            <tr>
                <td>
                    <label>First Name</label> <br>
                    <input class="inputFeeld" type="text" placeholder="Rony">
                    <br><br>
                </td>
                <td  class="secondCol">
                    <label>Last Name</label> <br>
                    <input class="inputFeeld" type="text" placeholder="Jone">
                    <br><br>
                </td>
            </tr>

            <tr>
                <td>
                    <label>Phone</label> <br>
                    <input class="inputFeeld" type="text" placeholder="0765244678">
                    <br><br>
                </td>
                <td class="secondCol">
                    <label>Email</label><br>
                    <input class="inputFeeld" type="text" placeholder="Jone@gmail.com">
                    <br><br>
                </td>
            </tr>

            <tr>
                <td>
                    <label>From</label> <br>
                    <input class="inputFeeld" type="text" placeholder="Colombo">
                    <br><br>
                </td>
                <td class="secondCol">
                    <label>To</label> <br>
                    <input class="inputFeeld" type="text" placeholder="Matara">
                    <br><br>
                </td>
            </tr>

            <tr>
                <td>
                    <label>Adults</label> <br>
                    <input class="inputFeeld" type="number" placeholder="0">
                    <br><br>
                </td>
                <td class="secondCol">
                    <label>Chidren</label> <br>
                    <input class="inputFeeld" type="number" placeholder="0">
                    <br><br>
                </td>
            </tr>

            <tr>
                <td >
                    <label>Reservation Date</label> <br>
                    <input class="inputFeeld" type="date">
                    <br><br>
                </td>
                 <td class="secondCol">
                    <label>Reservation Time</label> <br>
                    <input class="inputFeeld" type="time">
                    <br><br>
                </td>
            </tr>

            <tr>
               <td>
                    <label>journey type</label> <br>
                    <select class="inputFeeld" name="type" id="">
                        <option value="">On way</option>
                        <option value="">Car</option>
                        <option value="">Van</option>
                        <option value="">Bike</option>
                        <option value="">Bus</option>
                    </select>
                    <br><br>
                </td>
                <td class="secondCol">
                    <label>Include Travel Insurance</label> <br>
                    <input class="inputFeeld" type="radio">
                    <input class="inputFeeld" type="radio">
                </td>
            </tr>
        </table>






    </div>




</body>

</html>
