<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tavel Booking - Registration</title>
    <link rel="stylesheet" href="style.css">
</head>

<body class="registrationBody">

    

        <table class="box1">
            
            <tr>
                <td colspan="2">
                    <h1 id="title">Travel Booking Form</h1>
                </td>
            </tr>
            <tr>
                <td>
                    <label>First Name</label> <br>
                    <input class="inputFeeld" type="text" placeholder="Rony" id="txtFirstName">
                    <br><br>
                </td>
                <td class="secondCol">
                    <label>Last Name</label> <br>
                    <input class="inputFeeld" type="text" placeholder="Jone" id="txtLastName">
                    <br><br>
                </td>
            </tr>

            <tr>
                <td>
                    <label>Phone</label> <br>
                    <input class="inputFeeld" type="text" placeholder="0765244678" id="txtPhoneNum">
                    <br><br>
                </td>
                <td class="secondCol">
                    <label>Email</label><br>
                    <input class="inputFeeld" type="text" placeholder="Jone@gmail.com" id="txtEmail">
                    <br><br>
                </td>
            </tr>

            <tr>
                <td>
                    <label>From</label> <br>
                    <input class="inputFeeld" type="text" placeholder="Colombo" id="txtFrom">
                    <br><br>
                </td>
                <td class="secondCol">
                    <label>To</label> <br>
                    <input class="inputFeeld" type="text" placeholder="Matara" id="txtTo">
                    <br><br>
                </td>
            </tr>

            <tr>
                <td>
                    <label>Adults</label> <br>
                    <input class="inputFeeld" type="number" placeholder="0" id="txtAdults">
                    <br><br>
                </td>
                <td class="secondCol">
                    <label>Children</label> <br>
                    <input class="inputFeeld" type="number" placeholder="0" id="txtChildren">
                    <br><br>
                </td>
            </tr>

            <tr>
                <td>
                    <label>Reservation Date</label> <br>
                    <input class="inputFeeld" type="date" id="txtDate">
                    <br><br>
                </td>
                <td class="secondCol">
                    <label>Reservation Time</label> <br>
                    <input class="inputFeeld" type="time" id="txtTime">
                    <br><br>
                </td>
            </tr>

            <tr>
                <td>
                    <label>journey type</label> <br>
                    <select class="inputFeeld" name="type">
                        <option value="" id="">Wildlife Tour</option>
                        <option value="" id="">Adventure Tour</option>
                        <option value="" id="">City Tour</option>
                        <option value="" id="">Beach Tour</option>
                        <option value="" id="">Trekking Tour</option>
                    </select>
                    <br><br>
                </td>
                <td class="secondCol">
                    <label>Include Travel Insurance</label> <br>
                    <label>Yes<input class="inputFeeld" type="radio" id="c"> | </label>
                    <label>No<input class="inputFeeld" type="radio" id="txtInsuranceNo"></label>
                </td>
            </tr>
            <tr>
                <td colspan="2"><br></td>
            </tr>

            <tr>

                <td colspan="2">
                    <h2 style="text-align: center;">
                        <input type="button" value="Conform Booking" onclick="btnConformBooking()" class="btn">
                    </h2>
                </td>
            </tr>
            
        </table>

        <script src="app.js"></script>

   




</body>

</html>
